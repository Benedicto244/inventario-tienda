<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda con Inventario Automático</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
background:#2c3e50;
color:white;
padding:15px;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#3498db;
color:white;
}

.stock{
font-weight:bold;
}

</style>

</head>

<body>

<h1>MI TIENDA</h1>

<table id="tabla">
<thead>
<tr>
<th>ID</th>
<th>Producto</th>
<th>Precio</th>
<th>Disponibles</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

<script>

const url="https://docs.google.com/spreadsheets/d/103ApUTXHOqW2nCnLOrBZULdxUTyt_yrAn1opcxuSuIE/gviz/tq?tqx=out:csv";

fetch(url)
.then(res=>res.text())
.then(data=>{

const filas=data.split("\n");
const tabla=document.querySelector("#tabla tbody");

filas.slice(1).forEach(fila=>{

const columnas=fila.split(",");

let tr=document.createElement("tr");

tr.innerHTML=`

<td>${columnas[0]}</td>
<td>${columnas[1]}</td>
<td>$${columnas[2]}</td>
<td class="stock">${columnas[3]}</td>

`;

tabla.appendChild(tr);

});

});

</script>

</body>
</html>
